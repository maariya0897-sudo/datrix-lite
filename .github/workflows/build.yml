name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk autoconf libtool pkg-config libncurses5-dev libncursesw5-dev cmake
          pip install --upgrade pip setuptools
          pip install "buildozer>=1.5.0" "cython<3.0.0"

      - name: Build APK with Buildozer
        env:
          ACCEPT_BUILD_LICENSES: "y"
          BUILD_NDK: "1"
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer --verbose android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Datrix-Lite-APK
          path: bin/*.apk
